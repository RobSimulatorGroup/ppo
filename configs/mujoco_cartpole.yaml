env:
  type: mujoco_cartpole
  device: cpu
  options:
    max_episode_steps: 500
    force_limit: 100.0
    pole_angle_limit: 0.4
    initial_angle_range: 0.05
    target_position: 1.0

ppo:
  total_steps: 200000
  rollout_steps: 2048
  update_epochs: 10
  minibatch_size: 64
  learning_rate: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  hidden_size: 64
  initial_log_std: 0.0
  action_scale: 1.0
  save_dir: checkpoints/mujoco_cartpole
  save_every: 50000
  log_path: runs/mujoco_cartpole.csv
